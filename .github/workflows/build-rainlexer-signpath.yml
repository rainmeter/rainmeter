name: build-rainlexer-signpath

on:
  push:
    tags:
      - rainlexer-v[0-9]+.[0-9]+.[0-9]+

env:
  BUILD_VERSION: ${{ github.ref_name }}

jobs:
  rainlexer:
    runs-on: windows-2025-vs2026
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Build RainLexer
        run: .\RainLexer\Build\Build.ps1 rainlexer $env:BUILD_VERSION.Replace('rainlexer-v', '')
        shell: pwsh

      - name: Upload RainLexer build
        uses: actions/upload-artifact@v7
        with:
          name: RainLexerBuild
          path: |
            RainLexer/x32-Release
            !RainLexer/x32-Release/Obj
            RainLexer/x64-Release
            !RainLexer/x64-Release/Obj
          if-no-files-found: error

  installer:
    environment:
      name: signpath
      deployment: false
    needs: rainlexer
    runs-on: windows-2025-vs2026
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Download RainLexer build
        uses: actions/download-artifact@v8
        with:
          name: RainLexerBuild
          path: .

      - name: Upload combined build
        uses: actions/upload-artifact@v7
        id: upload-build
        with:
          name: RainLexerBuild-${{ github.ref_name }}
          path: |
            x32-Release/RainLexer.dll
            x64-Release/RainLexer.dll
          if-no-files-found: error

      - name: Remove build directories
        run: rm -rf x32-Release x64-Release
        shell: bash

      - name: Sign RainLexer DLLs
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: '${{ secrets.SIGNPATH_API_KEY }}'
          organization-id: '2d37d539-98b7-4649-9469-4097b1099202'
          project-slug: 'rainmeter'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'zip'
          github-artifact-id: '${{ steps.upload-build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: RainLexer

      - name: Install NSIS
        uses: ./.github/actions/install-nsis

      - name: Build installer
        run: .\RainLexer\Build\Build.ps1 installer $env:BUILD_VERSION.Replace('rainlexer-v', '')
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v7
        id: upload-installer
        with:
          path: RainLexer/Build/RainLexer-*.exe
          archive: false
          if-no-files-found: error

      - name: Sign installer
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: '${{ secrets.SIGNPATH_API_KEY }}'
          organization-id: '2d37d539-98b7-4649-9469-4097b1099202'
          project-slug: 'rainmeter'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe'
          github-artifact-id: '${{ steps.upload-installer.outputs.artifact-id }}'
          wait-for-completion: false
