name: build

on:
  push:
    branches:
      - '**'

jobs:
  rainmeter:
    strategy:
      matrix:
        arch: [32, 64]

    runs-on: windows-2022
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Build ${{ matrix.arch }}-bit Rainmeter
        run: cd Build && Build.bat rainmeter-${{ matrix.arch }} 0.0.0.0
        shell: cmd

      - name: Upload ${{ matrix.arch }}-bit build
        uses: actions/upload-artifact@v7
        with:
          name: x${{ matrix.arch }}-Release
          path: |
            x${{ matrix.arch }}-Release
            !x${{ matrix.arch }}-Release/Obj
          if-no-files-found: error

  installer:
    needs: rainmeter
    runs-on: windows-2022
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Download 32-bit & 64-bit builds
        uses: actions/download-artifact@v8
        with:
          pattern: x*-Release

      - name: Install NSIS
        run: choco install nsis --version=3.12.0 --no-progress

      - name: Build installer
        run: cd Build && Build.bat installer 0.0.0.0
        shell: cmd

      - name: Upload installer
        uses: actions/upload-artifact@v7
        id: upload-installer
        with:
          path: Build/Rainmeter-*.exe
          archive: false
          if-no-files-found: error
