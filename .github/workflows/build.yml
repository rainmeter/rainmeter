name: build

on:
  push:
    branches:
      - '**'

jobs:
  rainmeter:
    if: "!contains(github.event.head_commit.message, 'skipci')"
    strategy:
      matrix:
        arch: [32, 64]
    runs-on: windows-2025-vs2026
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Build ${{ matrix.arch }}-bit Rainmeter
        run: |
          $buildVersion = "$(Get-Date -Format 'yyyy.M.d').$env:GITHUB_RUN_NUMBER"
          .\Build\Build.ps1 rainmeter-${{ matrix.arch }} $buildVersion include-tests
        shell: pwsh

      - name: Test 64-bit Rainmeter
        if: ${{ matrix.arch == 64 }}
        run: .\Build\Build.ps1 test-64
        shell: pwsh

      - name: Upload ${{ matrix.arch }}-bit build
        uses: actions/upload-artifact@v7
        with:
          name: Release${{ matrix.arch }}
          path: |
            BuildOut/Release${{ matrix.arch }}
            !BuildOut/Release${{ matrix.arch }}/Obj
          if-no-files-found: error

  installer:
    needs: rainmeter
    runs-on: windows-2025-vs2026
    steps:
      - name: Clone repo
        uses: actions/checkout@v5

      - name: Download 32-bit & 64-bit builds
        uses: actions/download-artifact@v8
        with:
          pattern: Release*
          path: BuildOut

      - name: Install NSIS
        uses: ./.github/actions/install-nsis

      - name: Build installer
        run: |
          $buildVersion = "$(Get-Date -Format 'yyyy.M.d').$env:GITHUB_RUN_NUMBER"
          cd Build
          .\Build.ps1 installer $buildVersion
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v7
        id: upload-installer
        with:
          path: Build/Rainmeter-*.exe
          archive: false
          if-no-files-found: error
